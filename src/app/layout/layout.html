<ion-app>
  <ion-menu contentId="main-content" [swipeGesture]="true" type="overlay">
    <ion-header>
      <ion-toolbar>
        <ion-title>Menú</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content>
      <ion-list>
        <ion-item
          (click)="onNavigate()"
          (keyDown)="onNavigate()"
          detail="false"
          routerLink="/home"
        >
          <ion-label>Listado de tareas</ion-label>
        </ion-item>
        <ion-item
          (click)="onNavigate()"
          (keyDown)="onNavigate()"
          detail="false"
          routerLink="/add-task"
        >
          <ion-label>Agregar Tarea</ion-label>
        </ion-item>
        <ion-item
          (click)="onNavigate()"
          (keyDown)="onNavigate()"
          detail="false"
          routerLink="/categories"
        >
          <ion-label>Categorías</ion-label>
        </ion-item>
      </ion-list>
    </ion-content>
  </ion-menu>

  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
