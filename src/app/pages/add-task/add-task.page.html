<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Agregar Tarea</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form (ngSubmit)="onSave()">
    <ion-item>
      <ion-label position="floating">Título de la tarea</ion-label>
      <ion-input type="text" [(ngModel)]="task.title" name="title"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label>Categoría</ion-label>
      <ion-select
        [(ngModel)]="task.category"
        name="category"
        placeholder="Selecciona una categoría"
      >
        <ion-select-option value="trabajo">Trabajo</ion-select-option>
        <ion-select-option value="personal">Personal</ion-select-option>
        <ion-select-option value="estudio">Estudio</ion-select-option>
      </ion-select>
    </ion-item>

    <ion-button expand="block" type="submit" color="success">
      Guardar
    </ion-button>
  </form>
</ion-content>
