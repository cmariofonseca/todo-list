<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Tareas</ion-title>
    <ion-buttons slot="end">
      <ion-button routerLink="/add-task">Agregar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-segment
    mode="md"
    [(ngModel)]="selectedCategory"
    (ionChange)="onCategoryChange($event)"
  >
    <ion-segment-button value="all">
      <ion-label>Todas</ion-label>
    </ion-segment-button>
    <ion-segment-button value="trabajo">
      <ion-label>Trabajo</ion-label>
    </ion-segment-button>
    <ion-segment-button value="personal">
      <ion-label>Personal</ion-label>
    </ion-segment-button>
    <ion-segment-button value="estudio">
      <ion-label>Estudio</ion-label>
    </ion-segment-button>
  </ion-segment>

  <ion-list *ngIf="tasks.length > 0; else noTasks">
    <app-task-item
      *ngFor="let task of tasks"
      [task]="task"
      (taskDeleted)="loadTasks()"
    />
  </ion-list>

  <ng-template #noTasks>
    <div class="empty-state">
      <p>No tienes tareas aún. ¡Agrega una nueva!</p>
    </div>
  </ng-template>
</ion-content>
